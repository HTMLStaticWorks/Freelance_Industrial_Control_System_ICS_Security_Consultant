<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThreatForge | Coming Soon</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body data-theme="dark" style="display: flex; flex-direction: column; min-height: 100vh;">
  <div style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px;">
    <div style="max-width: 600px; width: 100%; background: var(--color-surface); padding: 40px; border: 1px solid var(--color-border); text-align: center;">
      <div class="status-dot mb-4" style="justify-content: center;">● SYSTEM INITIALIZING...</div>
      
      <h1 class="section-title mb-4">OT Threat Intelligence Feed</h1>
      <p class="section-subtitle mb-4">A curated feed of ICS vulnerabilities and active exploits is currently in development.</p>
      
      <div style="font-family: var(--font-display); font-size: 2rem; color: var(--color-accent); margin-bottom: 40px;">
        <span id="days">00</span>d : 
        <span id="hours">00</span>h : 
        <span id="minutes">00</span>m : 
        <span id="seconds">00</span>s
      </div>

      <div style="text-align: left; background: #000; padding: 24px; border: 1px solid var(--color-border);">
        <label style="display: block; font-family: var(--font-display); margin-bottom: 12px; color: var(--color-accent);">Get notified when the feed launches:</label>
        <!-- MAILCHIMP_EMBED_CODE_HERE -->
        <form style="display: flex; gap: 8px;">
          <input type="email" placeholder="Enter corporate email" style="flex: 1; padding: 12px; background: transparent; border: 1px solid var(--color-border); color: #fff; font-family: var(--font-body);" required>
          <button type="button" class="btn btn-primary">[ SUBSCRIBE ]</button>
        </form>
      </div>

      <div class="mt-4">
        <a href="index.html" style="color: var(--color-muted); font-family: var(--font-display); text-decoration: none;">[ RETURN TO HOME ]</a>
      </div>
    </div>
  </div>

  <script>
    // Countdown Timer Logic
    const countDownDate = new Date().getTime() + (30 * 24 * 60 * 60 * 1000); // 30 days from now

    const updateTimer = setInterval(function() {
      const now = new Date().getTime();
      const distance = countDownDate - now;

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById("days").innerHTML = days.toString().padStart(2, '0');
      document.getElementById("hours").innerHTML = hours.toString().padStart(2, '0');
      document.getElementById("minutes").innerHTML = minutes.toString().padStart(2, '0');
      document.getElementById("seconds").innerHTML = seconds.toString().padStart(2, '0');

      if (distance < 0) {
        clearInterval(updateTimer);
        document.getElementById("days").innerHTML = "00";
        document.getElementById("hours").innerHTML = "00";
        document.getElementById("minutes").innerHTML = "00";
        document.getElementById("seconds").innerHTML = "00";
      }
    }, 1000);
  </script>
</body>
</html>
